<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pokemon Assignment 1</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="shortcut icon" href="./PokemonFavIcon.png" type="image/x-icon" />
  </head>
  <body>
    <main class="mainCard">

      <div class="backgroundLayer">
        <div class="backgroundYellow"></div>
        <div class="backgroundBeige"></div>
      </div>

      <div class="contentLayer">
        <header class="navigationBar">
          <img src="./pokemon_logo.png" alt="Pokemon Logo" class="pokemonLogo" />
          <button class="hamburgerMenuIconButton"><img src="./hamburger_menu_icon.png" alt="" height="67px" width="70px"></button>
        </header>

        <section class="mainBody">
          <article class="textContent">
            <span class="subtitle">POKEMON GEN 1</span>
            <h1 class="pokemonName">Pikachu</h1>
            <p class="pokemonDescription">
              Pikachu is an Electric-type Pokemon introduced<br> in Generation I.
              Pikachu are small, chubby,<br> and incredibly cute mouse-like Pokémon.<br>
              They are almost completely covered by<br> yellow fur.
            </p>

            <div class="pagination-bottom">
              <span class="line"></span>
              <span class="pageNumbers">- 01 / 08</span>
            </div>

            <img src="./Pokeball.png" alt="" class="watermark" />
          </article>

          <div class="visualContent">
            <img src="./Pickachu.png" alt="Pikachu" class="pickachuImage" />

            <div class="sideNavigationDots">
              <span class="activeDot"></span>
              <span class="dot"></span>
              <span class="dot"></span>
              <span class="dot"></span>
              <span class="dot"></span>
            </div>
          </div>
        </section>
      </div>
    </main>
  </body>
</html>
